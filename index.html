<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holy Bread of Life Church</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0A192F',
                        gold: '#D4AF37',
                        'gold-light': '#F4E4BC',
                        accent: '#FF6B35',
                        paper: '#FDFCFB',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>
    <style>
        :root {
            --navy: #0A192F;
            --gold: #D4AF37;
            --gold-light: #F4E4BC;
            --accent: #FF6B35;
            --paper: #FDFCFB;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            color: var(--navy);
            background-color: var(--paper);
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(10, 25, 47, 0.05);
        }

        .hero-gradient {
            background: linear-gradient(to bottom, rgba(10, 25, 47, 0.7), rgba(10, 25, 47, 0.4));
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .stagger-item {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
       .logo{
           width: 100px;
           height: 60px;
           border: 2px solid #e2bf6b;
      border-radius: 90px;
      font-size: 100px;
       }

        .stagger-item.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes pointDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        .animate-point-down {
            animation: pointDown 2s ease-in-out infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--paper);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--navy);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }
    </style>
</head>
<body class="bg-paper">

    <div id="app">
        <!-- Content will be injected by JavaScript -->
    </div>

    <script>
        // --- State Management ---
        let currentPage = 'home';
        let isJoinModalOpen = false;

        // --- Data Configuration ---
        const churchData = {
            name: "Holy Bread of Life",
            logoText: { main: "HOLY BREAD", accent: "OF LIFE" },
            navLinks: [
                { id: 'home', name: 'Home' },
                { id: 'sermons', name: 'Sermons' },
                { id: 'about', name: 'About Us' },
                { id: 'ministries', name: 'Ministries' },
                { id: 'events', name: 'Events' }
            ],
            hero: {
                headline: "Where Faith Finds Its <span class='text-gold italic font-normal'>Voice</span>",
                subheadline: "Join our vibrant community as we journey together in God's grace and love.",
                bgImage: "https://images.unsplash.com/photo-1438232992991-995b7058bbb3?auto=format&fit=crop&q=80&w=2000",
            },
            dailyVerses: [
                { quote: "For I know the plans I have for you, declares the Lord, plans for welfare and not for evil, to give you a future and a hope.", author: "Jeremiah 29:11", context: "Daily Bread" },
                { quote: "I can do all things through him who strengthens me.", author: "Philippians 4:13", context: "Daily Bread" },
                { quote: "The Lord is my shepherd; I shall not want.", author: "Psalm 23:1", context: "Daily Bread" },
                { quote: "Trust in the Lord with all your heart, and do not lean on your own understanding.", author: "Proverbs 3:5", context: "Daily Bread" },
                { quote: "But they who wait for the Lord shall renew their strength; they shall mount up with wings like eagles.", author: "Isaiah 40:31", context: "Daily Bread" },
                { quote: "Be strong and courageous. Do not be frightened, and do not be dismayed, for the Lord your God is with you wherever you go.", author: "Joshua 1:9", context: "Daily Bread" },
                { quote: "And we know that for those who love God all things work together for good, for those who are called according to his purpose.", author: "Romans 8:28", context: "Daily Bread" }
            ],
            sermons: [
                { id: 'SVpztz2KOVo', title: 'The Power of Persistence', speaker: 'Senior Pastor' },
                { id: 'mlFq35JmxQ8', title: 'Walking in Grace', speaker: 'Guest Speaker' },
                { id: '8eF9FY9W6_c', title: 'Hope in Hard Times', speaker: 'Associate Pastor' },
                { id: 'pvSic-qyzLs', title: 'Faith Over Fear', speaker: 'Senior Pastor' },
                { id: 'B-kWYzuvRL0', title: 'Community & Love', speaker: 'Youth Pastor' },
                { id: 'FyrGPwANcKE', title: 'Live Service Archive', speaker: 'Church Media' }
            ],
            ministries: [
                { title: 'Worship Ministry', desc: 'Leading the congregation into the presence of God through music and praise.', icon: '🎵' },
                { title: 'Youth Church', desc: 'Empowering the next generation to live for Christ in a modern world.', icon: '🔥' },
                { title: 'Children\'s Ministry', desc: 'Nurturing young hearts with the foundational truths of the Bible.', icon: '🎨' },
                { title: 'Men\'s Fellowship', desc: 'Building strong men of integrity and faith through brotherhood.', icon: '🛡️' },
                { title: 'Women of Hope', desc: 'A community of women growing together in grace and wisdom.', icon: '🌸' },
                { title: 'Outreach Team', desc: 'Taking the love of Christ beyond our walls to the community.', icon: '🌍' },
            ],
            location: {
                address: "Mwiki, Kasarani, Nairobi, Kenya",
                phone: "+254 721 436629",
                email: "info@holybreadoflife.org",
                mapEmbed: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15955.564615886!2d36.9189!3d-1.2345!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f3f0000000000%3A0x0!2zMcKwMTQnMDQuMiJTIDM2wrA1NScwOC4wIkU!5e0!3m2!1sen!2ske!4v1710000000000!5m2!1sen!2ske",
                directionsLink: "https://maps.app.goo.gl/ehonNmTtK3eyxd937"
            },
            socials: [
                { name: 'Facebook', icon: 'facebook', href: 'https://facebook.com/holybreadoflife' },
                { name: 'Twitter', icon: 'twitter', href: 'https://twitter.com/holybreadoflife' },
                { name: 'Instagram', icon: 'instagram', href: 'https://instagram.com/holybreadoflife' },
                { name: 'YouTube', icon: 'youtube', href: 'https://www.youtube.com/@holybreadoflife' }
            ],
            whatsapp: "https://wa.me/254721 436629"
        };

        // --- Component Rendering Functions ---

        function renderNavbar() {
            return `
                <nav class="fixed top-0 left-0 right-0 z-50 glass">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex justify-between items-center">
                        <div class="flex items-center cursor-pointer group" onclick="navigateTo('home')">
                            <div class="relative">
                                <img src="logo.png" class="logo">
                                <span style="display:none" class="text-navy font-serif font-black text-2xl tracking-tighter uppercase">
                                    HOLY BREAD<span class="text-gold">OF LIFE</span>
                                </span>
                            </div>
                        </div>
                        <div class="hidden md:flex items-center space-x-10">
                            ${churchData.navLinks.map(link => `
                                <button onclick="navigateTo('${link.id}')" class="relative text-navy/60 hover:text-navy font-sans font-bold text-[10px] uppercase tracking-[0.2em] transition-all group">
                                    ${link.name}
                                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-gold transition-all group-hover:w-full ${currentPage === link.id ? 'w-full' : ''}"></span>
                                </button>
                            `).join('')}
                            <button onclick="toggleJoinModal(true)" class="bg-navy text-white px-8 py-3 rounded-full font-sans font-bold text-[10px] uppercase tracking-[0.2em] hover:bg-gold hover:text-navy transition-all shadow-xl shadow-navy/10">
                                Join Us
                            </button>
                        </div>
                        <div class="md:hidden">
                            <button id="mobile-menu-btn" class="text-navy p-2">
                                <i data-lucide="menu" class="w-8 h-8"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Mobile Menu -->
                    <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-navy/5 px-6 py-10 space-y-6">
                        ${churchData.navLinks.map(link => `
                            <button onclick="navigateTo('${link.id}')" class="block w-full text-left text-navy/60 hover:text-navy font-sans font-bold text-lg uppercase tracking-widest">${link.name}</button>
                        `).join('')}
                        <button class="w-full bg-navy text-white py-5 rounded-2xl font-sans font-bold text-sm uppercase tracking-widest">Giving</button>
                    </div>
                </nav>
            `;
        }

        function renderHero() {
            return `
                <section id="home" class="relative min-h-screen flex items-center justify-center overflow-hidden">
                    <div class="absolute inset-0 z-0 scale-110">
                        <img src="${churchData.hero.bgImage}" class="w-full h-full object-cover" alt="Church Hero">
                        <div class="absolute inset-0 hero-gradient"></div>
                    </div>
                    <div class="relative z-10 max-w-7xl mx-auto px-4 text-center py-20 reveal">
                        <span class="text-gold font-sans font-bold tracking-[0.4em] uppercase text-[10px] md:text-xs mb-6 block">Est. 2024 • Nairobi, Kenya</span>
                        <h1 class="text-5xl md:text-8xl lg:text-9xl font-serif font-black text-white mb-8 tracking-tighter leading-[0.9]">
                            ${churchData.hero.headline}
                        </h1>
                        <p class="text-lg md:text-2xl text-white/70 max-w-2xl mx-auto mb-12 font-sans font-light leading-relaxed px-4">
                            ${churchData.hero.subheadline}
                        </p>
                        <div class="flex flex-col sm:flex-row justify-center items-center gap-6 px-4">
                            <button onclick="toggleJoinModal(true)" class="w-full sm:w-auto bg-white text-navy px-12 py-5 rounded-full font-sans font-bold text-xs uppercase tracking-[0.2em] hover:bg-gold transition-all shadow-2xl">
                                Join Our Family
                            </button>
                            <button onclick="navigateTo('sermons')" class="flex items-center gap-4 text-white font-sans font-bold text-xs uppercase tracking-[0.2em] group">
                                <span class="w-14 h-14 rounded-full border border-white/30 flex items-center justify-center group-hover:bg-white group-hover:text-navy transition-all">
                                    <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                                </span>
                                Watch Sermons
                            </button>
                        </div>
                    </div>

                    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 animate-point-down text-white/30">
                        <i data-lucide="chevron-down" size={32}></i>
                    </div>
                </section>
            `;
        }

        function renderVerse() {
            const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            const verse = churchData.dailyVerses[dayOfYear % churchData.dailyVerses.length];
            
            return `
                <section class="py-32 bg-navy text-white relative overflow-hidden reveal">
                    <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
                        <div class="relative">
                            <span class="text-gold font-sans font-bold tracking-[0.4em] uppercase text-[10px] md:text-xs mb-8 block">${verse.context}</span>
                            <div class="relative">
                                <i data-lucide="quote" class="absolute -top-10 -left-10 w-20 h-20 text-gold/10"></i>
                                <h2 class="text-4xl md:text-6xl font-serif font-bold italic leading-tight mb-10">
                                    "${verse.quote}"
                                </h2>
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-0.5 bg-gold"></div>
                                    <p class="text-gold font-sans font-bold uppercase tracking-widest text-sm">${verse.author}</p>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div class="aspect-[4/5] rounded-[2rem] overflow-hidden rotate-2 hover:rotate-0 transition-transform duration-700">

                            <div class="aspect-[4/5] rounded-[2rem] overflow-hidden -rotate-2 hover:rotate-0 transition-transform duration-700 mt-12">
                                <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Community">
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderSermons() {
            return `
                <section id="sermons" class="py-32 bg-paper reveal">
                    <div class="max-w-7xl mx-auto px-4">
                        <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-8">
                            <div class="max-w-2xl">
                                <span class="text-gold font-sans font-bold tracking-[0.4em] uppercase text-[10px] md:text-xs mb-4 block">Watch & Listen</span>
                                <h2 class="text-5xl md:text-7xl font-serif font-black text-navy tracking-tighter leading-none">
                                    Latest <span class="text-gold italic font-normal">Messages</span>
                                </h2>
                            </div>
                            <p class="text-navy/40 font-sans text-sm max-w-xs leading-relaxed">
                                Experience the transformative power of the Word through our digital archive of weekly messages.
                            </p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                            ${churchData.sermons.map(video => `
                                <a href="https://www.youtube.com/watch?v=${video.id}" target="_blank" class="group stagger-item block">
                                    <div class="aspect-[16/10] rounded-[2rem] overflow-hidden shadow-2xl relative mb-8">
                                        <img src="https://img.youtube.com/vi/${video.id}/maxresdefault.jpg" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="${video.title}" onerror="this.src='https://img.youtube.com/vi/${video.id}/hqdefault.jpg'">
                                        <div class="absolute inset-0 bg-navy/40 group-hover:bg-navy/10 transition-all duration-500 flex items-center justify-center">
                                            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-2xl transform scale-0 group-hover:scale-100 transition-all duration-500">
                                                <i data-lucide="play" class="text-navy w-6 h-6 fill-current"></i>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-gold font-sans font-bold uppercase tracking-widest text-[10px] mb-2">${video.speaker}</p>
                                        <h3 class="font-serif font-bold text-navy text-2xl group-hover:text-gold transition-colors leading-tight">${video.title}</h3>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderLocation() {
            return `
                <section id="about" class="py-32 bg-paper reveal">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
                            <div class="space-y-10">
                                <div>
                                    <span class="text-gold font-sans font-bold tracking-[0.4em] uppercase text-[10px] md:text-xs mb-4 block">Visit Us</span>
                                    <h2 class="text-5xl md:text-7xl font-serif font-black text-navy tracking-tighter leading-none mb-8">
                                        Find Your <br />
                                        <span class="text-gold italic font-normal">Sanctuary</span>
                                    </h2>
                                    <p class="text-navy/50 font-sans text-lg leading-relaxed max-w-md">
                                        We are located in the heart of our community, ready to welcome you with open arms and a warm spirit.
                                    </p>
                                </div>

                                <div class="space-y-8">
                                    <div class="flex items-start gap-6 group">
                                        <div class="w-14 h-14 bg-white rounded-2xl shadow-xl shadow-navy/5 flex items-center justify-center flex-shrink-0 group-hover:bg-gold transition-colors duration-300">
                                            <i data-lucide="map-pin" class="text-gold group-hover:text-white transition-colors duration-300"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-serif font-bold text-navy text-xl mb-1">Our Location</h4>
                                            <p class="text-navy/60 font-sans leading-relaxed">${churchData.location.address}</p>
                                        </div>
                                    </div>

                                    <div class="flex items-start gap-6 group">
                                        <div class="w-14 h-14 bg-white rounded-2xl shadow-xl shadow-navy/5 flex items-center justify-center flex-shrink-0 group-hover:bg-gold transition-colors duration-300">
                                            <i data-lucide="phone" class="text-gold group-hover:text-white transition-colors duration-300"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-serif font-bold text-navy text-xl mb-1">Phone Number</h4>
                                            <p class="text-navy/60 font-sans leading-relaxed">${churchData.location.phone}</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="pt-6">
                                    <a href="${churchData.location.directionsLink}" target="_blank" class="inline-flex items-center gap-3 bg-navy text-white px-10 py-4 rounded-full font-sans font-bold text-sm uppercase tracking-widest hover:bg-gold hover:text-navy transition-all shadow-2xl shadow-navy/10">
                                        Get Directions <i data-lucide="external-link" class="w-4 h-4"></i>
                                    </a>
                                </div>
                            </div>

                            <div class="relative">
                                <div class="absolute -inset-4 bg-gold/10 rounded-[3rem] -rotate-2"></div>
                                <div class="relative aspect-square rounded-[2.5rem] overflow-hidden shadow-2xl border-8 border-white">
                                    <iframe src="${churchData.location.mapEmbed}" class="w-full h-full grayscale hover:grayscale-0 transition-all duration-700" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderMinistries() {
            return `
                <section id="ministries" class="py-32 bg-paper reveal">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="text-center mb-20">
                            <span class="text-gold font-sans font-bold tracking-[0.4em] uppercase text-[10px] md:text-xs mb-4 block">Our Work</span>
                            <h2 class="text-5xl md:text-7xl font-serif font-black text-navy tracking-tighter leading-none">
                                Vibrant <span class="text-gold italic font-normal">Ministries</span>
                            </h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                            ${churchData.ministries.map(item => `
                                <div class="group p-10 bg-white rounded-[2.5rem] shadow-xl shadow-navy/5 border border-navy/5 transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl">
                                    <div class="text-4xl mb-6">${item.icon}</div>
                                    <h3 class="font-serif font-bold text-navy text-2xl mb-4 group-hover:text-gold transition-colors">${item.title}</h3>
                                    <p class="text-navy/50 font-sans text-sm leading-relaxed">${item.desc}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderEvents() {
            return `
                <section id="events" class="py-32 bg-paper text-center reveal">
                    <div class="max-w-3xl mx-auto px-4">
                        <span class="text-gold font-sans font-bold tracking-[0.4em] uppercase text-[10px] md:text-xs mb-4 block">Calendar</span>
                        <h2 class="text-5xl md:text-7xl font-serif font-black text-navy tracking-tighter leading-none mb-8">
                            Upcoming <span class="text-gold italic font-normal">Events</span>
                        </h2>
                        <div class="p-12 bg-white rounded-[3rem] shadow-2xl shadow-navy/5 border border-navy/5">
                            <p class="text-navy/50 font-sans text-lg mb-8">We are currently planning our next season of gatherings. Check back soon for updates!</p>
                            <div class="w-20 h-1 bg-gold/20 mx-auto"></div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderFooter() {
            return `
                <footer class="bg-navy py-24 text-white">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                        <div class="mb-12 flex justify-center">
                            <div class="relative">

                                <span style="display:none" class="text-white font-serif font-black text-3xl tracking-tighter uppercase">
                                    HOLY BREAD<span class="text-gold">OF LIFE</span>
                                </span>
                            </div>
                        </div>

                        <div class="flex flex-wrap justify-center gap-x-12 gap-y-6 mb-16">
                            ${churchData.navLinks.map(link => `
                                <button onclick="navigateTo('${link.id}')" class="text-white/40 hover:text-gold text-xs font-sans font-bold uppercase tracking-[0.2em] transition-all">${link.name}</button>
                            `).join('')}
                        </div>

                        <div class="flex justify-center space-x-10 mb-16">
                            ${churchData.socials.map(social => `
                                <a href="${social.href}" target="_blank" class="text-white/20 hover:text-gold transition-all transform hover:scale-125" title="${social.name}">
                                    <i data-lucide="${social.icon}" class="w-6 h-6"></i>
                                </a>
                            `).join('')}
                        </div>

                        <div class="pt-12 border-t border-white/5">
                            <p class="text-white/20 text-[10px] font-sans font-bold uppercase tracking-[0.3em]">
                                © ${new Date().getFullYear()} Holy Bread of Life Church. All rights reserved.
                            </p>
                        </div>
                    </div>
                </footer>
            `;
        }

        function renderWhatsApp() {
            return `
                <a href="${churchData.whatsapp}" target="_blank" class="fixed bottom-8 right-8 z-50 bg-[#25D366] text-white p-5 rounded-full shadow-2xl flex items-center justify-center transition-all transform hover:scale-110 hover:rotate-12 active:scale-95 group">
                    <i data-lucide="message-circle" class="w-8 h-8 fill-current"></i>
                    <span class="absolute right-full mr-4 bg-white text-navy px-4 py-2 rounded-xl font-bold text-sm shadow-xl opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-gray-100">Chat with Us</span>
                </a>
            `;
        }

        function renderJoinModal() {
            if (!isJoinModalOpen) return '';
            return `
                <div class="fixed inset-0 z-[100] flex items-center justify-center px-4">
                    <div class="absolute inset-0 bg-navy/90 backdrop-blur-sm" onclick="toggleJoinModal(false)"></div>
                    <div class="relative bg-white w-full max-w-lg rounded-[3rem] overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-300">
                        <div class="p-8 md:p-12">
                            <div class="flex justify-between items-start mb-8">
                                <div>
                                    <span class="text-gold font-sans font-bold tracking-[0.4em] uppercase text-[10px] mb-2 block">Connect</span>
                                    <h2 class="text-4xl font-serif font-black text-navy tracking-tighter">Join Our <span class="text-gold italic font-normal">Family</span></h2>
                                </div>
                                <button onclick="toggleJoinModal(false)" class="text-navy/20 hover:text-navy transition-colors">
                                    <i data-lucide="x" class="w-8 h-8"></i>
                                </button>
                            </div>
                            
                            <form onsubmit="handleJoinSubmit(event)" class="space-y-6">
                                <div>
                                    <label class="block text-[10px] font-sans font-bold uppercase tracking-widest text-navy/40 mb-2">Full Name</label>
                                    <input type="text" required name="name" placeholder="Enter your name" class="w-full bg-paper border border-navy/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-gold transition-colors font-sans">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-sans font-bold uppercase tracking-widest text-navy/40 mb-2">Phone Number</label>
                                    <input type="tel" required name="phone" placeholder="Enter your phone number" class="w-full bg-paper border border-navy/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-gold transition-colors font-sans">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-sans font-bold uppercase tracking-widest text-navy/40 mb-2">Your Location</label>
                                    <input type="text" required name="location" placeholder="Where do you live?" class="w-full bg-paper border border-navy/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-gold transition-colors font-sans">
                                </div>
                                <button type="submit" class="w-full bg-navy text-white py-5 rounded-2xl font-sans font-bold text-xs uppercase tracking-[0.2em] hover:bg-gold hover:text-navy transition-all shadow-xl shadow-navy/10">
                                    Submit Request
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- Main App Controller ---

        function navigateTo(page) {
            currentPage = page;
            initApp();
            window.scrollTo(0, 0);
        }

        function toggleJoinModal(show) {
            isJoinModalOpen = show;
            initApp();
        }

        function handleJoinSubmit(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            console.log('Join Request:', data);
            alert(`Thank you ${data.name}! We've received your request to join Holy Bread of Life. We'll contact you at ${data.phone} soon.`);
            toggleJoinModal(false);
        }

        function initApp() {
            const app = document.getElementById('app');
            
            let content = '';
            switch(currentPage) {
                case 'home':
                    content = `
                        ${renderHero()}
                        ${renderVerse()}
                        <!-- Info Section -->
                        <section class="py-24 bg-paper border-y border-navy/5 reveal">
                            <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
                                <div class="group p-8 rounded-3xl hover:bg-white hover:shadow-xl transition-all duration-500">
                                    <h4 class="text-gold font-serif font-black text-5xl mb-2">8:00 AM</h4>
                                    <p class="uppercase tracking-[0.3em] font-sans font-bold text-navy/30 text-[10px]">Morning Glory</p>
                                </div>
                                <div class="group p-8 rounded-3xl hover:bg-white hover:shadow-xl transition-all duration-500 border-y md:border-y-0 md:border-x border-navy/5">
                                    <h4 class="text-gold font-serif font-black text-5xl mb-2">10:30 AM</h4>
                                    <p class="uppercase tracking-[0.3em] font-sans font-bold text-navy/30 text-[10px]">Main Celebration</p>
                                </div>
                                <div class="group p-8 rounded-3xl hover:bg-white hover:shadow-xl transition-all duration-500">
                                    <h4 class="text-gold font-serif font-black text-5xl mb-2">5:00 PM</h4>
                                    <p class="uppercase tracking-[0.3em] font-sans font-bold text-navy/30 text-[10px]">Evening Service</p>
                                </div>
                            </div>
                        </section>
                    `;
                    break;
                case 'sermons':
                    content = renderSermons();
                    break;
                case 'about':
                    content = renderLocation();
                    break;
                case 'ministries':
                    content = renderMinistries();
                    break;
                case 'events':
                    content = renderEvents();
                    break;
            }

            // Assemble the page
            app.innerHTML = `
                ${renderNavbar()}
                <main class="pt-0">
                    ${content}
                </main>
                ${renderFooter()}
                ${renderWhatsApp()}
                ${renderJoinModal()}
            `;

            // Initialize Icons
            lucide.createIcons();

            // Intersection Observer for Reveal Animations
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        const staggerItems = entry.target.querySelectorAll('.stagger-item');
                        staggerItems.forEach((item, index) => {
                            setTimeout(() => {
                                item.classList.add('active');
                            }, index * 100);
                        });
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal').forEach(section => {
                observer.observe(section);
            });

            // Event Listeners
            setupEventListeners();
        }

        function setupEventListeners() {
            // Mobile Menu Toggle
            const menuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            if (menuBtn && mobileMenu) {
                menuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        }

        // Start the application
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
